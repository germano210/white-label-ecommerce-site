spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

jwt.secret=${JWT_SECRET}
jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}

app.cors.allowed-origins=${FRONTEND_ORIGIN:https://brechodacami.com},${ADMIN_FRONTEND_ORIGIN:https://www.brechodacami.com}
app.security.require-https=true
app.initializer.admin-email=${ADMIN_EMAIL:}
app.initializer.admin-password=${ADMIN_PASSWORD:}
app.initializer.admin-telefone=${ADMIN_TELEFONE:admin}

payment.webhook-secret=${PAYMENT_WEBHOOK_SECRET}
payment.api-key=${PAYMENT_API_KEY:}
payment.checkout-base-url=${PAYMENT_CHECKOUT_BASE_URL}
